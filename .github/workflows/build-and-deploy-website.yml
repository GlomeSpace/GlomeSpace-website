name: GlomeSpace-Website-CD

on:
  push:
    branches: ["master"]

jobs:

  # JOB 1 — Frontend: quality checks + build
  frontend-checks:
    name: "Frontend — Quality & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Formatting (Prettier)
        run: npm run format

#      - name: Lint (ESLint)
#        run: npm run lint

      - name: Build Frontend
        run: npm run build


  # JOB 2 — Backend: quality checks + build
  backend-checks:
    name: "Backend (Strapi) — Quality & Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: glomespace_blogs

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: glomespace_blogs/package-lock.json

      - name: Install Dependencies
        run: npm ci

      #- name: Lint (ESLint)
      #  run: npm run lint

      - name: Build Strapi Admin Panel
        run: npm run build
        env:
          NODE_ENV: production
          APP_KEYS: "ci-key-1,ci-key-2,ci-key-3,ci-key-4"
          API_TOKEN_SALT: "ci-api-token-salt"
          ADMIN_JWT_SECRET: "ci-admin-jwt-secret"
          TRANSFER_TOKEN_SALT: "ci-transfer-token-salt"
          ENCRYPTION_KEY: "ci-encryption-key"
          JWT_SECRET: "ci-jwt-secret"

  # JOB 3 — Build & Push both images to Docker Hub Only runs after both quality check jobs pass
  build-and-push:
    name: "Docker — Build & Push to Docker Hub"
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/glomespace-website:frontend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/glomespace-website:frontend-${{ github.sha }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./glomespace_blogs
          file: ./glomespace_blogs/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/glomespace-website:backend-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/glomespace-website:backend-${{ github.sha }}

  # JOB 4 — Deploy: SSH into EC2, pull new images, restart Only runs after images are successfully pushed
  deploy-to-ec2:
    name: "Deploy — Pull & Restart on EC2"
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4              # Needed to copy docker-compose.yml to EC2

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/GlomeSpace-Website/"      # Ensures EC2 always has the latest compose config

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/GlomeSpace-Website

            echo "🔐 Logging into Docker Hub on EC2..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            echo "📦 Pulling latest backend image..."
            docker compose pull backend

            echo "🚀 Restarting backend service..."
            docker compose up -d --remove-orphans backend

            echo "🔓 Logging out of Docker Hub..."
            docker logout

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete."
            docker compose ps

  # JOB 5 — CD Summary (always runs, clear pass/fail)
  cd-summary:
    name: "CD — Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks, build-and-push, deploy-to-ec2]
    if: always()

    steps:
      - name: Evaluate CD Result
        run: |
          if [[ "${{ needs.frontend-checks.result }}"  != "success" || \
                "${{ needs.backend-checks.result }}"   != "success" || \
                "${{ needs.build-and-push.result }}"   != "success" || \
                "${{ needs.deploy-to-ec2.result }}"    != "success" ]]; then
            echo "❌ CD pipeline failed — deployment was NOT applied to EC2."
            echo ""
            echo "   frontend-checks : ${{ needs.frontend-checks.result }}"
            echo "   backend-checks  : ${{ needs.backend-checks.result }}"
            echo "   build-and-push  : ${{ needs.build-and-push.result }}"
            echo "   deploy-to-ec2   : ${{ needs.deploy-to-ec2.result }}"
            exit 1
          fi
          echo "✅ CD pipeline passed — EC2 is running the latest images."
          echo ""
          echo "   Image tags pushed:"
          echo "   • ${{ secrets.DOCKERHUB_USERNAME }}/glomespace:website-v1.0"
          echo "   • ${{ secrets.DOCKERHUB_USERNAME }}/glomespace:frontend-${{ github.sha }}"
          echo "   • ${{ secrets.DOCKERHUB_USERNAME }}/glomespace:backend-${{ github.sha }}"
